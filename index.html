<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apartment Search</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/modal.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<div class="logo">

Apartment Finder

</div>

<div class="searchBox">

<input
id="search"
type="text"
placeholder="Search by neighborhood, amenities, or bedrooms">

</div>

</header>

<section class="filters">

<button>Any Price</button>

<button>Bedrooms</button>

<button>Bathrooms</button>

<button>Pet Friendly</button>

<button>Pool</button>

<button>Garage</button>

</section>

<main>

<div id="loading">

Loading Apartments...

</div>

<div id="listingGrid">

</div>

</main>

<div id="listingModal" class="modal">

<div class="modalContent">

<button id="closeModal">

✕

</button>

<div id="modalBody">

</div>

</div>

</div>

<script src="js/api.js"></script>
<script src="js/listings.js"></script>
<script src="js/app.js"></script>

</body>
</html>
